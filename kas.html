<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas Digital X AK 2 - SMK Negeri 12 Jakarta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('206705_2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            padding-bottom: 90px; 
        }

        .top-bg {
            background: linear-gradient(135deg, #c62828 0%, #b71c1c 100%);
            color: white;
            text-align: center;
            padding: 45px 20px 85px 20px;
            border-bottom-left-radius: 35px; 
            border-bottom-right-radius: 35px; 
            box-shadow: 0 10px 25px rgba(198, 40, 40, 0.3);
        }

        .top-bg h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15);
        }

        .top-bg p {
            font-size: 14px;
            opacity: 0.95;
            font-weight: 500;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            margin: -50px 20px 20px 20px; 
            padding: 30px 22px;
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        .card-header {
            font-size: 19px;
            font-weight: 800;
            color: #c62828; 
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-bottom: 2px solid rgba(198, 40, 40, 0.1);
            padding-bottom: 12px;
        }

        .qris-box {
            background: white;
            padding: 16px;
            border-radius: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            display: inline-block;
            margin-bottom: 20px;
            max-width: 100%;
            border: 1px solid rgba(0,0,0,0.04);
        }

        .qris-box img {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 12px;
        }

        .info-text {
            font-size: 14px;
            color: #444;
            line-height: 1.6;
            margin-bottom: 22px;
            font-weight: 500;
        }

        .wa-btn {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #25d366 0%, #1ebe5d 100%);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.35);
            transition: all 0.3s ease;
        }

        .wa-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.45);
        }

        .wa-btn:active {
            transform: translateY(0);
        }

        .bottom-nav {
            position: fixed; 
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 14px 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            z-index: 100;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .nav-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #adb5bd; 
            font-size: 12px;
            font-weight: 600;
            gap: 4px;
            transition: color 0.3s ease;
        }

        .nav-item.active {
            color: #c62828; 
        }

        .nav-item.active .nav-icon {
            opacity: 1;
            transform: scale(1.1);
        }

        .nav-icon {
            font-size: 22px;
            opacity: 0.7;
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="top-bg">
        <h1>KAS DIGITAL</h1>
        <p>X AK 2 - SMK Negeri 12 Jakarta</p>
    </div>

    <div class="card-container">
        <div class="card-header">
            💰 <span>Scan QRIS Kas</span>
        </div>
        
        <div class="qris-box">
            <!-- Pastikan nama file gambar QRIS sesuai -->
            <img src="210103-clean.png" alt="QRIS Kas Digital X AK 2">
        </div>

        <div class="info-text">
            Sudah membayar kas? Silakan kirimkan bukti transaksi kamu melalui tombol di bawah ini:
        </div>

        <!-- Tombol Kirim Bukti Transaksi ke WhatsApp dengan Teks Otomatis -->
        <a href="https://wa.me/6285282331327?text=Assalamualaikum,%20saya%20ingin%20mengirimkan%20bukti%20pembayaran%20Kas%20Digital.%0A%0A-%20Nama%20Lengkap:%20%0A-%20Nomor%20Absen:%20%0A-%20Bulan%20Kas:%20%0A-%20Nominal:%20Rp%20%0A%0A(Lampirkan%20screenshot%20bukti%20transfer%20di%20bawah%20pesan%20ini)" 
           class="wa-btn" target="_blank">
            📱 Kirim Bukti Transaksi
        </a>
    </div>

    <div class="bottom-nav">
        <a href="./index.html" class="nav-item">
            <span class="nav-icon">📝</span>
            <span class="nav-text">Absen</span>
        </a>
        <a href="./kas.html" class="nav-item active">
            <span class="nav-icon">💰</span>
            <span class="nav-text">Kas Digital</span>
        </a>
        <a href="./admin.html" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">Admin</span>
        </a>
    </div>
</body>
</html>
