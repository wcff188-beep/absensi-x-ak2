<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi X AK 2 - SMK Negeri 12 Jakarta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-image: url('206705_2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            padding-bottom: 80px; 
        }

        .top-bg {
            background-color: rgba(198, 40, 40, 0.85); 
            color: white;
            text-align: center;
            padding: 40px 20px 90px 20px;
            border-bottom-left-radius: 40px; 
            border-bottom-right-radius: 40px; 
        }

        .top-bg h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .top-bg p {
            font-size: 14px;
            opacity: 0.9;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            margin: -60px 20px 20px 20px; 
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .card-header {
            font-size: 18px;
            font-weight: 700;
            color: #c62828; 
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: #444;
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #c62828; 
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: #d32f2f; 
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #b71c1c; 
        }

        button:disabled {
            background-color: #ffcdd2; 
        }

        .notification {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
        }

        .notification.hidden {
            display: none;
        }

        .notification.success {
            background-color: #e1f5fe;
            color: #0277bd;
        }

        .notification.error {
            background-color: #ffebee;
            color: #c62828; 
        }

        .bottom-nav {
            position: fixed; 
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: space-around;
            padding: 12px 0 15px 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.03);
            z-index: 100;
        }

        .nav-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #9e9e9e; 
            font-size: 13px;
            font-weight: 600;
            gap: 5px;
        }

        .nav-item.active {
            color: #c62828; 
        }

        .nav-item.active .nav-icon {
            opacity: 1;
        }

        .nav-icon {
            font-size: 22px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="top-bg">
        <h1>ABSENSI X AK 2</h1>
        <p>SMK Negeri 12 Jakarta</p>
    </div>

    <div class="card-container">
        <div class="card-header">
            📝 <span>Form Kehadiran</span>
        </div>
        
        <form id="absensiForm">
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <select id="nama" name="nama" required>
                    <option value="" disabled selected>-- Pilih Nama Anda --</option>
                    <option value="A'ISY PUTRI RAHAYU">A'ISY PUTRI RAHAYU</option>
                    <option value="ANGEL SILVIANA">ANGEL SILVIANA</option>
                    <option value="ANGGITA PUTRI AULIA PANGGABEAN">ANGGITA PUTRI AULIA PANGGABEAN</option>
                    <option value="ARNHILDA VIVIA DANASTRI">ARNHILDA VIVIA DANASTRI</option>
                    <option value="AUREL ZAHRA SUTAWIJAYA">AUREL ZAHRA SUTAWIJAYA</option>
                    <option value="AZZAHRA APRILIYANI">AZZAHRA APRILIYANI</option>
                    <option value="CAHYA HALIMATUL AULIA">CAHYA HALIMATUL AULIA</option>
                    <option value="DALILATI BATRISYIA SAJIDAH">DALILATI BATRISYIA SAJIDAH</option>
                    <option value="DEVI SEFTIANA FITRI">DEVI SEFTIANA FITRI</option>
                    <option value="FARAH HASANAH PUTRI">FARAH HASANAH PUTRI</option>
                    <option value="GEISHAVINKA NAMIRA MALENGGA">GEISHAVINKA NAMIRA MALENGGA</option>
                    <option value="HAERANI NUR KAMILA">HAERANI NUR KAMILA</option>
                    <option value="HAMIDAH">HAMIDAH</option>
                    <option value="KEISHA NABILAH SAKHI">KEISHA NABILAH SAKHI</option>
                    <option value="KEISHA RAMADANTI EL CHAIRY">KEISHA RAMADANTI EL CHAIRY</option>
                    <option value="LUSIANAH JUNITA PUTRI">LUSIANAH JUNITA PUTRI</option>
                    <option value="MUTIARA LEDENSKI PANGARIBUAN">MUTIARA LEDENSKI PANGARIBUAN</option>
                    <option value="NABILLA NOER RAMADHANI">NABILLA NOER RAMADHANI</option>
                    <option value="NADIV YAQZAN RAY">NADIV YAQZAN RAY</option>
                    <option value="NATASYA AULIA PUTRI">NATASYA AULIA PUTRI</option>
                    <option value="PIKA APRIANTI">PIKA APRIANTI</option>
                    <option value="PUTRI AYU NABILA">PUTRI AYU NABILA</option>
                    <option value="PUTRI FETO ZAHIRAH">PUTRI FETO ZAHIRAH</option>
                    <option value="PUTRI REGINA">PUTRI REGINA</option>
                    <option value="RAFFINZA KHAIRISMA DESWIRA">RAFFINZA KHAIRISMA DESWIRA</option>
                    <option value="RAHMAT APRILLA SAMSONG">RAHMAT APRILLA SAMSONG</option>
                    <option value="ROIS HANIF ALFIROS">ROIS HANIF ALFIROS</option>
                    <option value="RUTH MEIQUILLA SYAH">RUTH MEIQUILLA SYAH</option>
                    <option value="SAFA LAILA RAMADHANI">SAFA LAILA RAMADHANI</option>
                    <option value="SHAFA RIZKI ALLIYAH">SHAFA RIZKI ALLIYAH</option>
                    <option value="SILVIA KUSWARA">SILVIA KUSWARA</option>
                    <option value="SILVIANI PUTRI">SILVIANI PUTRI</option>
                    <option value="SYIFA AZZAHRAH DAHLIA">SYIFA AZZAHRAH DAHLIA</option>
                    <option value="TSARAUNA AFIFA SHOLEHA">TSARAUNA AFIFA SHOLEHA</option>
                    <option value="ZALFA NAURA RIYANTI">ZALFA NAURA RIYANTI</option>
                    <option value="ZUL NAILA ASSYIFA">ZUL NAILA ASSYIFA</option>
                </select>
            </div>

            <div class="form-group">
                <label for="no_absen">Nomor Absen</label>
                <input type="number" id="no_absen" name="no_absen" min="1" max="36" placeholder="Ketik nomor absen..." required>
            </div>

            <div class="form-group">
                <label>Status Kehadiran</label>
                <select id="status" name="status" required>
                    <option value="" disabled selected>Pilih Status...</option>
                    <option value="Hadir">✅ Hadir</option>
                    <option value="Izin">🟡 Izin</option>
                    <option value="Sakit">🟠 Sakit</option>
                    <option value="Alpha">🔴 Alpha</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Kirim Kehadiran</button>
        </form>

        <div id="notification" class="notification hidden"></div>
    </div>

    <div class="bottom-nav">
        <!-- Menggunakan ./ agar navigasi lebih stabil di HP -->
        <a href="./index.html" class="nav-item active">
            <span class="nav-icon">📝</span>
            <span class="nav-text">Absen</span>
        </a>
        <a href="./admin.html" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">Admin</span>
        </a>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
