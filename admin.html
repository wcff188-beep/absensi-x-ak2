<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Absensi X AK 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #dc2626;
            --primary-dark: #b91c1c;
            --bg-glass: rgba(255, 255, 255, 0.96);
            --shadow-subtle: 0 10px 30px -5px rgba(0, 0, 0, 0.08);
            --shadow-card: 0 20px 45px -10px rgba(0, 0, 0, 0.18);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        
        body {
            background-image: linear-gradient(135deg, rgba(15, 23, 42, 0.8), rgba(30, 41, 59, 0.8)), url('206705_2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            padding-bottom: 100px; 
            color: #1e293b;
        }

        /* Header Dashboard Modern */
        .app-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 45px 20px 90px 20px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .header-content {
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .badge-org {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(220, 38, 38, 0.2);
            color: #fca5a5;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 12px;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }

        .app-header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .app-header p {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
        }

        /* Container Utama */
        .main-container {
            max-width: 480px;
            margin: -55px auto 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px 24px;
            border-radius: 26px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
        }

        .card-header {
            font-size: 16px; 
            font-weight: 700; 
            color: #0f172a; 
            margin-bottom: 22px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            justify-content: space-between;
            border-bottom: 2px dashed rgba(220, 38, 38, 0.15);
            padding-bottom: 12px;
        }

        .form-group { 
            margin-bottom: 20px; 
        }

        .form-group label { 
            display: block; 
            font-size: 13px; 
            font-weight: 700; 
            color: #334155; 
            margin-bottom: 8px; 
            letter-spacing: 0.2px;
        }

        .form-group input {
            width: 100%; 
            padding: 15px 16px; 
            border: 1.5px solid #cbd5e1;
            border-radius: 14px; 
            font-size: 14px; 
            outline: none; 
            transition: all 0.25s ease;
            background-color: #ffffff; 
            color: #0f172a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }

        .form-group input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.12), inset 0 2px 4px rgba(0,0,0,0.01);
        }

        button {
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-size: 15px; 
            font-weight: 700;
            cursor: pointer; 
            box-shadow: 0 8px 22px -4px rgba(220, 38, 38, 0.45);
            transition: all 0.25s ease;
        }

        button:hover { 
            background: linear-gradient(135deg, #ef4444 0%, var(--primary) 100%);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px -4px rgba(220, 38, 38, 0.55);
        }

        button:active {
            transform: translateY(0);
        }

        button.btn-small { 
            padding: 8px 14px; 
            font-size: 12px; 
            width: auto; 
            border-radius: 10px; 
            background: #475569; 
            box-shadow: none;
        }

        button.btn-small:hover { 
            background: #334155; 
            transform: none;
            box-shadow: none;
        }

        .table-responsive { 
            overflow-x: auto; 
            margin-top: 10px; 
            background: #ffffff; 
            border-radius: 14px; 
            padding: 4px; 
            border: 1px solid #e2e8f0;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 13px; 
        }

        th { 
            text-align: left; 
            padding: 12px 10px; 
            border-bottom: 2px solid #e2e8f0; 
            color: var(--primary); 
            font-weight: 700;
            background: #f8fafc;
        }

        td { 
            padding: 12px 10px; 
            border-bottom: 1px solid #f1f5f9; 
            color: #1e293b; 
        }

        tr:last-child td {
            border-bottom: none;
        }
        
        .notification { 
            margin-top: 15px; 
            padding: 14px; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 13px; 
            font-weight: 600; 
            display: none; 
        }

        .notification.error { 
            background-color: #fef2f2; 
            color: #b91c1c; 
            border: 1px solid #fecaca;
            display: block; 
        }

        /* Navigasi Bawah Modern */
        .bottom-nav {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0 16px 0;
            box-shadow: 0 -10px 25px rgba(0, 0, 0, 0.08); 
            z-index: 100;
            border-top: 1px solid rgba(226, 232, 240, 0.8);
        }

        .nav-item { 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #94a3b8; 
            font-size: 11px; 
            font-weight: 700; 
            gap: 4px; 
            transition: color 0.25s ease;
        }

        .nav-item.active { 
            color: var(--primary); 
        }

        .nav-icon { 
            font-size: 20px; 
            transition: transform 0.25s ease;
        }

        .nav-item.active .nav-icon { 
            transform: scale(1.15); 
        }
    </style>
</head>
<body>

    <!-- Header Dashboard -->
    <div class="app-header">
        <div class="header-content">
            <span class="badge-org">
                <span>🛡️</span> SMK Negeri 12 Jakarta
            </span>
            <h1>PANEL ADMIN</h1>
            <p>Pengurus X AK 2 - Portal Verifikasi</p>
        </div>
    </div>

    <!-- Sesi Login -->
    <div class="main-container">
        <div class="card" id="loginSection">
            <div class="card-header">
                <div>🔒 <span>Login Pengurus</span></div>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Masukkan username..." required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password..." required>
                </div>
                <button type="submit">Masuk</button>
                <div id="loginError" class="notification error" style="display: none;">Username atau Password salah!</div>
            </form>
        </div>

        <!-- Sesi Dashboard Admin -->
        <div class="card" id="dashboardSection" style="display: none;">
            <div class="card-header">
                <div>📊 <span>Data Hari Ini</span></div>
                <button id="logoutBtn" class="btn-small">Logout</button>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Jam</th>
                            <th>Nama</th>
                            <th>No</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="4" style="text-align: center; padding: 20px; color: #64748b;">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Navigasi Bawah Lengkap (Absen, Kas Digital, Admin) -->
    <div class="bottom-nav">
        <a href="./index.html" class="nav-item">
            <span class="nav-icon">📝</span>
            <span class="nav-text">Absen</span>
        </a>
        <a href="./kas.html" class="nav-item">
            <span class="nav-icon">💳</span>
            <span class="nav-text">Kas Digital</span>
        </a>
        <a href="./admin.html" class="nav-item active">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">Admin</span>
        </a>
    </div>

    <script src="config.js"></script>
    <script>
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const logoutBtn = document.getElementById('logoutBtn');

        if (sessionStorage.getItem('isAdminLoggedIn') === 'true') { showDashboard(); }

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('username').value === "AK2 GACOR" && document.getElementById('password').value === "Adadeh") {
                sessionStorage.setItem('isAdminLoggedIn', 'true');
                showDashboard();
            } else {
                loginError.style.display = 'block';
                setTimeout(() => { loginError.style.display = 'none'; }, 3000);
            }
        });

        logoutBtn.addEventListener('click', function() {
            sessionStorage.removeItem('isAdminLoggedIn');
            location.reload();
        });

        function showDashboard() {
            loginSection.style.display = 'none';
            dashboardSection.style.display = 'block';
            fetchAdminData();
        }

        async function fetchAdminData() {
            const tbody = document.getElementById('tableBody');
            try {
                const response = await fetch(`${CONFIG.SCRIPT_URL}?action=getToday`);
                const result = await response.json();
                if (result.status === 'success') {
                    tbody.innerHTML = result.data.length === 0 ? '<tr><td colspan="4" style="text-align: center; padding: 20px; color: #64748b;">Belum ada absensi.</td></tr>' : '';
                    
                    // Diurutkan berdasarkan Nomor Absen (Kecil ke Besar / 1 sampai 35)
                    result.data.sort((a, b) => parseInt(a[2]) - parseInt(b[2])).forEach(row => {
                        const tr = document.createElement('tr');
                        // Memastikan kolom jam terambil dengan aman tanpa undefined
                        const waktuFull = row[0] ? row[0].split(' ') : [];
                        const jamOnly = waktuFull.length > 1 ? waktuFull[1] : (waktuFull[0] || '-');
                        
                        tr.innerHTML = `<td>${jamOnly}</td><td>${row[1]}</td><td>${row[2]}</td><td><strong>${row[3]}</strong></td>`;
                        tbody.appendChild(tr);
                    });
                }
            } catch (error) { tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #b91c1c; padding: 20px;">Gagal memuat data.</td></tr>'; }
        }
    </script>
</body>
</html>
